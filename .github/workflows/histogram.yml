name: General Report - Histogram of Issues (all)

on:
  schedule:
    - cron: '0 0 * * SUN'  # Runs every Sunday at midnight
  workflow_dispatch:  # Allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_PAT }}  # Use GIT_PAT instead of default GITHUB_TOKEN

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"  # Use the latest Python 3.x version

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub matplotlib

      # Step 4: Create the artifacts directory (if it doesn't exist)
      - name: Create artifacts directory
        run: mkdir -p artifacts

      # Step 5: Generate histogram (all issues) and commit it
      - name: Generate and commit histogram
        run: python scripts/histogram.py
        env:
          GIT_PAT: ${{ secrets.GIT_PAT }}  # Use Personal Access Token

      # Step 6: Push changes to the repository
      - name: Push histogram to repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/histogram.png
          git commit -m "Updated histogram - $(date)"
          git push
        env:
          GIT_PAT: ${{ secrets.GIT_PAT }}



