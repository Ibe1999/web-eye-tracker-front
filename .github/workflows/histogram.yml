name: General Report - Histogram of Issues (all)

on:
  schedule:
    - cron: '0 0 * * SUN'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub matplotlib

      - name: Generate histogram (all issues)
        run: python scripts/histogram.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List files in artifacts directory (debug)
        run: ls -R artifacts/

      - name: Configure git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Add histogram PNG to git
        run: |
          git add artifacts/histogram.png  # Ensure we're adding the correct file
          git commit -m "Add histogram of issues"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

