name: General Report - Histogram of Issues (all)

permissions:
  contents: write
  issues: read

on:
  schedule:
    - cron: '0 0 * * 0'  # Runs every Sunday at midnight UTC
  workflow_dispatch:

jobs:
  histogram_analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas matplotlib

      - name: Fetch issue data
        run: |
          issues=$(curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" "https://api.github.com/repos/${{ github.repository }}/issues?state=all&per_page=100")
          echo "$issues" > issues.json
          echo "ISSUES_FILE=issues.json" >> $GITHUB_ENV
          
      - name: Print issues.json content
        run: cat issues.json

      - name: Run Histogram script
        run: python scripts/histogram.py

      - name: Ensure artifacts directory exists
        run: mkdir -p artifacts

      - name: List files to check for generated images
        run: ls -lah

      - name: Check if Histogram chart is generated
        run: |
          if [ -f "artifacts/histogram.png" ]; then 
            echo "Histogram chart generated successfully."; 
          else 
            echo "Histogram chart not found."; 
            exit 1;
          fi

      - name: Commit and push Histogram to repository
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          
          if [ -f artifacts/histogram.png ]; then
            git add artifacts/histogram.png
            git commit -m "Update histogram report" || echo "No changes to commit"
            git push origin main
          else
            echo "No histogram generated. Skipping commit."
          fi


