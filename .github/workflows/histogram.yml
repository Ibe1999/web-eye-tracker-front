name: General Report - Histogram of Issues (all)

on:
  schedule:
    - cron: '0 0 * * SUN'  # Runs every Sunday at 00:00 UTC
  workflow_dispatch:  # Also allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub matplotlib

      - name: Generate histogram (all issues)
        run: python scripts/histogram.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List files in artifacts directory (debug)
        run: |
          echo "Checking contents of the artifacts directory"
          ls -R artifacts/

      - name: Check if histogram.png exists (debug)
        run: |
          if [ -f artifacts/histogram.png ]; then echo "histogram.png exists"; else echo "histogram.png not found"; fi

      - name: Configure git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Add histogram PNG to git
        run: |
          # Check if the histogram.png file exists before adding it to git
          if [ -f artifacts/histogram.png ]; then
            git add artifacts/histogram.png
            git commit -m "Add histogram of issues"
            git push
          else
            echo "histogram.png not found, skipping git add and commit"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}




