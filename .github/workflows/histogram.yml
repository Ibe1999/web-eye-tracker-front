name: General Report - Histogram of Issues (all)

on:
  schedule:
    - cron: '0 0 * * SUN'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub matplotlib

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Generate histogram (all issues)
        run: python scripts/histogram.py
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Upload Histogram to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: histogram_issues
          path: artifacts/histogram.png

      - name: Commit and Push Histogram to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/histogram.png
          git commit -m "Auto-update histogram"
          git push https://github.com/Ibe1999/web-eye-tracker-front.git HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

