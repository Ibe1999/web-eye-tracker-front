name: General Report - Histogram of Issues (all)

on:
  schedule:
    - cron: '0 0 * * SUN'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub matplotlib

      - name: Generate histogram (all issues)
        run: python scripts/histogram.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Move Histograms to artifacts directory
        run: mv artifacts/histograms/*.png artifacts/ || echo "No files to move"

      - name: Upload Histogram
        uses: actions/upload-artifact@v4
        with:
          name: histogram_issues
          path: artifacts/histogram.png



