name: Generate Histogram of Issues by Label

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate_histogram:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub matplotlib

      - name: Run script to generate histogram
        run: python scripts/histogram.py

      - name: Upload histogram as artifact
        uses: actions/upload-artifact@v2
        with:
          name: histogram
          path: artifacts/histogram.png

