name: General Report - Histogram of Issues (all)

permissions:
  contents: write
  issues: read

on:
  schedule:
    - cron: '0 0 * * 0'  # Runs every Sunday at midnight UTC
  workflow_dispatch:

jobs:
  histogram_analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for git history operations

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas matplotlib PyGithub

      - name: Run Histogram script
        env:
          GH_PATH: ${{ secrets.GH_PATH }}  # Changed to match your token name
        run: |
          mkdir -p artifacts
          python scripts/histogram.py

      - name: Check if Histogram chart is generated
        run: |
          if [ -f "artifacts/histogram.png" ]; then 
            echo "✅ Histogram chart generated successfully."; 
          else 
            echo "❌ Histogram chart not found."; 
            exit 1;
          fi

      - name: Commit and push Histogram to artifacts/
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git pull origin main
          git add artifacts/histogram.png
          git commit -m "Automated update: Histogram report [skip ci]"
          git push origin main




