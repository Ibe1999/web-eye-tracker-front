name: Generar Reporte de Issues

on:
  schedule:
    - cron: "0 0 * * 1"  # Cada lunes a las 00:00 UTC
  workflow_dispatch:     # Permite ejecución manual

permissions:
  contents: write
  issues: read

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar el repositorio
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install Spanish locale
        run: |
          sudo apt-get update
          sudo apt-get install -y locales
          sudo locale-gen es_ES.UTF-8
          sudo update-locale LANG=es_ES.UTF-8
          export LANG=es_ES.UTF-8
          export LC_ALL=es_ES.UTF-8

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: 📦 Instalar dependencias
        run: pip install requests matplotlib scipy jq

      - name: 🔍 Verificar límite de rate
        run: |
          curl -H "Authorization: token ${{ secrets.GH_PAT }}" https://api.github.com/rate_limit

      - name: 🧑‍💻 Obtener los datos de los issues desde GitHub
        run: |
          page=1
          max_pages=10
          all_issues="[]"
          while [[ $page -le $max_pages ]]; do
            echo "Fetching page $page..."
            issues=$(curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" "https://api.github.com/repos/Ibe1999/web-eye-tracker-front/issues?state=all&per_page=100&page=$page")
            if [[ $(echo "$issues" | jq 'length') -eq 0 ]]; then
              echo "No more issues found. Exiting pagination loop."
              break
            fi
            all_issues=$(echo "$all_issues" | jq --argjson new_issues "$issues" '. + $new_issues')
            page=$((page + 1))
          done
          echo "$all_issues" > issues.json
          echo "ISSUES_FILE=issues.json" >> $GITHUB_ENV

      - name: 🐛 Debug de issues
        run: |
          echo "Número total de issues: $(jq 'length' issues.json)"
          echo "Primer issue:"
          jq '.[0]' issues.json

      - name: 📊 Ejecutar script de generación de gráficos
        run: python scripts/runchart.py

      - name: 📁 Listar archivos generados
        run: ls -R artifacts

      - name: 💾 Commit y push de los artifacts
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/*.png
          git commit -m "Actualización automática de gráficos [skip ci]" || echo "No hay cambios para hacer commit"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/Ibe1999/web-eye-tracker-front.git HEAD:main
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

