name: Generar Reporte de Issues

on:
  schedule:
    - cron: "0 0 * * 1"  # Se ejecuta cada lunes a las 00:00 UTC
  workflow_dispatch:  # Permite ejecución manual

permissions:
  contents: write  # Permiso para escribir en el repositorio
  issues: read     # Permiso para leer issues

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar el repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Clona todo el historial de commits

      - name: 🌍 Instalar localización en español
        run: |
          sudo apt-get update
          sudo apt-get install -y locales
          sudo locale-gen es_ES.UTF-8
          sudo update-locale LANG=es_ES.UTF-8
          export LANG=es_ES.UTF-8
          export LC_ALL=es_ES.UTF-8

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: 📦 Instalar dependencias
        run: pip install requests matplotlib scipy

      - name: 🧑‍💻 Obtener los datos de los issues desde GitHub
        run: |
          issues=$(curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" "https://api.github.com/repos/${{ github.repository }}/issues?state=all&per_page=100")
          echo "$issues" > issues.json
          echo "ISSUES_FILE=issues.json" >> $GITHUB_ENV

      - name: 📊 Ejecutar el script de generación de gráficos
        run: python scripts/runchart.py  # Ajusta la ruta si es necesario

      # Subir los gráficos como artifacts (opcional, para descargar manualmente)
      - name: Subir gráficos como artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gráficos
          path: artifacts/runchart.png

      # Commit y push de los artifacts al repositorio
      - name: 💾 Commit y push de los artifacts
        run: |
          # Configurar Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Agregar los archivos generados
          git add artifacts/runchart.png

          # Hacer commit de los cambios
          git commit -m "Actualización automática de gráficos [skip ci]"

          # Hacer push de los cambios al repositorio
          git push origin HEAD:${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Token para autenticación
